</head>
<body>
    <!-- Navigation Bar -->
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">MB</a>
            <button class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#portfolio">Portfolio</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Contact Page Content -->
    <section class="contact-page">
        <div class="contact-container">
            <h1>Contact Me</h1>
            <p class="contact-subtitle">Get in touch with me for collaborations, opportunities, or just to say hello!</p>
            
            <div class="contact-details">
                <!-- <div class="contact-card">
                    <div class="contact-icon">👤</div>
                    <h3>Name</h3>
                    <p>Musa Battah</p>
                </div> -->

                <div class="contact-card">
                    <div class="contact-icon">📧</div>
                    <h3>Email</h3>
                    <p><a href="mailto:musabattah@gmail.com">musabattah@gmail.com</a></p>
                </div>

                <div class="contact-card">
                    <div class="contact-icon">📱</div>
                    <h3>Phone</h3>
                    <p><a href="tel:+2348068880170">08068880170</a></p>
                </div>

                <div class="contact-card">
                    <div class="contact-icon">📍</div>
                    <h3>Address</h3>
                    <p>Abuja, Nigeria</p>
                </div>
            </div>

            <!-- Contact Form with mailto -->
            <div class="contact-form-container">
                <h2>Send Me a Message</h2>
                <form id="contactForm" class="contact-form" action="mailto:musabattah@gmail.com" method="post" enctype="text/plain">
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" name="name" required placeholder="Enter your name">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Your Email</label>
                        <input type="email" id="email" name="email" required placeholder="Enter your email">
                    </div>
                    
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required placeholder="Write your message here..."></textarea>
                    </div>
                    
                    <button type="submit" class="btn submit-btn">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2024 Musa Battah. All rights reserved.</p>
        </div>
    </footer>

    <!-- JavaScript File -->
    <script src="script.js"></script>
